image: Visual Studio 2022

version: '0.8.0.{build}'

branches:
  only:
    - dev
    - master

clone_folder: c:\projects\djvunet

# Define the matrix as raw environment variables to stop AppVeyor from parsing the .sln
environment:
  TargetFramework: net10.0
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  matrix:
    - PLATFORM: x64
      CONFIGURATION: Debug
    - PLATFORM: x64
      CONFIGURATION: Release

matrix:
  fast_finish: false

max_jobs: 4

build: off
test: off

init:
    - cmd: git config --global core.autocrlf false

install:
    - cmd: echo Publish directory [%PublishDir%]
    - cmd: cd c:\projects\djvunet
    - cmd: git clone -q --depth 1 --branch %APPVEYOR_REPO_BRANCH% https://github.com/DjvuNet/DjVuLibre.git djvulibre

build_script:
    - cmd: build -p %PLATFORM% -c %CONFIGURATION% -f net10.0 -sn -Test

test_script:
    - cmd: echo DjvuNet [%PLATFORM%] [%CONFIGURATION%] build by AppVeyor
